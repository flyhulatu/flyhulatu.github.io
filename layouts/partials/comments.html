<script>
    // 监听 PaperMod 的主题切换按钮
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const theme = document.body.className.includes("dark") ? 'light' : 'dark';
        
        // 针对 Giscus 的切换逻辑
        const iframe = document.querySelector('iframe.giscus-frame');
        if (iframe) {
            const message = { setConfig: { theme: theme === 'dark' ? 'dark' : 'light' } };
            iframe.contentWindow.postMessage({ giscus: message }, 'https://giscus.app');
        }

        // 针对 Waline 的切换逻辑 (如果你选了Waline)
        // if (window.Waline) { Waline.update({ dark: theme === 'dark' }); }
    });
</script>
