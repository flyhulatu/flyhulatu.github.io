<!-- 引入霞鹜文楷字体 -->
<link rel="stylesheet" href="https://npm.elemecdn.com/lxgw-wenkai-screen-webfont@1.7.0/lxgwwenkaiscreen.css" integrity="sha384-JSVn1znHuc8FVDp6lnwfdr+E/15Rtb/gBqsVMICU1fX4qsG81cPVTaneaJWFM8Ox" crossorigin="anonymous" media="print" onload="this.media='all'">

<style>
.typewriter {
  display: inline-block;
  overflow: hidden; /* 隐藏溢出 */
  border-right: .15em solid orange; /* 模拟光标 */
  white-space: nowrap; /* 强制不换行 */
  margin: 0 auto;
  letter-spacing: .15em;
  animation: 
    typing 3.5s steps(30, end) infinite, /* 3.5秒完成打字，无限循环 */
    blink-caret .5s step-end infinite;
}

/* 打字动画：改变宽度 */
@keyframes typing {
  0% { width: 0 }
  50% { width: 100% } /* 停留时间 */
  100% { width: 0 }
}

/* 光标闪烁 */
@keyframes blink-caret {
  from, to { border-color: transparent }
  50% { border-color: orange }
}
</style>
