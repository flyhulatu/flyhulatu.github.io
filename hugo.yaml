baseURL: "https://hulatu.com/"
languageCode: "zh"
title: "胡拉图的博客"
theme: "PaperMod"
defaultContentLanguage: "zh"

# 生成 HTML 的同时生成 Search 索引文件（PaperMod 搜索功能需要）
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  UseHugoToc: true
  showtoc: true
  tocopen: true

  comments: true  # 全局启用（或在文章中单独控制）
  env: production # 生产环境
  title: 我的博客
  description: "这是我的博客描述"
  keywords: [Blog, Tech, Hugo]
  author: Me
  
  # 默认主题颜色 (auto, dark, light)
  defaultTheme: auto
  # 禁止用户切换主题
  disableThemeToggle: false

  # 是否在首页显示全文 (false 为只显示摘要)
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
    
  # 确保资源加载正常
  assets:
    disableHLJS: false
    favicon: "/favicon.svg"                  # 主要 ICO
    favicon16x16: "/favicon-16x16.png"       # 16x16 PNG
    favicon32x32: "/favicon-32x32.png"       # 32x32 PNG
    apple_touch_icon: "/apple-touch-icon.png" # Apple 设备
    safari_pinned_tab: "/safari-pinned-tab.svg" # 可选 Safari
  
  # 个人资料页 (首页左侧或中间的介绍)
  profileMode:
    enabled: true
    title: "Welcome coming Hulatu's Blog!" # optional default will be site title
    subtitle: "写作，使我精确!"
    imageUrl: "/images/avatar.png" # optional
    imageTitle: "Little-Prince" # optional
    imageWidth: 120 # custom size
    imageHeight: 120 # custom size
  socialIcons:
    - name: rss
      url: "index.xml"

    - name: email
      url: "mailto:2983685624@qq.com"

    - name: github
      url: "https://github.com/flyhulatu"
    
    - name: wechat
      url: "https://hulatu.com/images/wechat.png"
    
    - name: zhihu
      url: "https://www.zhihu.com/people/hulatu"

    # 小红书 (对应 assets/images/svg/xiaohongshu.svg)
    # - name: xiaohongshu
    #   url: "https://hulatu.com/images/xiaohongshu.png"
    
    
    
      
    # QQ 邮箱/QQ (对应 assets/images/svg/qq.svg 如果你有的话)
    # - name: qq
    #   url: "https://hulatu.com/images/qq.png"

# 菜单配置
menu:
  main:
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40

services:
    googleAnalytics:
        id: "G-XXXXXXXXXX"