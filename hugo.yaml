baseURL: "https://hulatu.com/"
languageCode: "zh"
title: "胡拉图的博客"
theme: "PaperMod"
enableRobotsTXT: true
defaultContentLanguage: "zh"

# 生成 HTML 的同时生成 Search 索引文件（PaperMod 搜索功能需要）
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  UseHugoToc: true
  showtoc: true
  tocopen: true
  customHeadHTML: '<meta name="baidu-site-verification" content="codeva-6AyBRgtF7K" />'

  comments: true  # 全局启用（或在文章中单独控制）
  env: production # 生产环境
  title: 胡拉图的后花园
  description: "一位热爱运动、记录、分享的工科研究生"
  keywords: [成长, 运动, 生活]
  author: "图图"
  
  # 默认主题颜色 (auto, dark, light)
  defaultTheme: auto
  # 禁止用户切换主题
  disableThemeToggle: false

  # 是否在首页显示全文 (false 为只显示摘要)
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
    
  # 确保资源加载正常
  assets:
    disableHLJS: false
    favicon: "/favicon.png"                  # 主要 ICO
    favicon16x16: "/favicon.png"       # 16x16 PNG
    favicon32x32: "/favicon.png"       # 32x32 PNG
    apple_touch_icon: "/apple-touch-icon.png" # Apple 设备
    safari_pinned_tab: "/safari-pinned-tab.svg" # 可选 Safari
  
  # 个人资料页 (首页左侧或中间的介绍)
  profileMode:
    enabled: true
    title: "欢迎来到,我的世界" # optional default will be site title
    subtitle: "写作，使我精确"
    imageUrl: "/images/avatar.png" # optional
    imageTitle: "Little-Prince" # optional
    imageWidth: 120 # custom size
    imageHeight: 120 # custom size
    buttons: # 重点：在这里设置按钮
      - name: 📝 文章
        url: posts
      - name: 🏷️ 标签
        url: tags
      - name: 🐙 GitHub
        url: "https://github.com/yourusername"
    
  socialIcons:
    - name: rss
      url: "index.xml"

    - name: email
      url: "mailto:2983685624@qq.com"

    - name: github
      url: "https://github.com/flyhulatu"
    
    - name: wechat
      url: "https://hulatu.com/images/wechat.png"
    
    - name: zhihu
      url: "https://www.zhihu.com/people/hulatu"

    # 小红书 (对应 assets/images/svg/xiaohongshu.svg)
    # - name: xiaohongshu
    #   url: "https://hulatu.com/images/xiaohongshu.png"
    
    
    
      
    # QQ 邮箱/QQ (对应 assets/images/svg/qq.svg 如果你有的话)
    # - name: qq
    #   url: "https://hulatu.com/images/qq.png"

# 菜单配置
menu:
  main:
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40
    - identifier: links
      name: 友链
      url: /links/
      weight: 50

services:
    googleAnalytics:
        id: "G-XXXXXXXXXX"