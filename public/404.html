<canvas id="snow-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></canvas>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    
    
    const particleCount = 60; 
    const speed = 0.5;        
    const size = 2.5;         
    
    
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    
    
    function initParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * size, 
                d: Math.random() * particleCount, 
                a: Math.random() * 0.5 + 0.1 
            });
        }
    }
    
    
    function draw() {
        ctx.clearRect(0, 0, width, height);
        
        
        
        const isDark = document.body.className.includes('dark');
        ctx.fillStyle = isDark ? 'rgba(255, 255, 255, 0.8)' : 'rgba(100, 100, 100, 0.5)';
        
        ctx.beginPath();
        for (let i = 0; i < particleCount; i++) {
            const p = particles[i];
            ctx.moveTo(p.x, p.y);
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
        }
        ctx.fill();
        update();
    }
    
    
    function update() {
        for (let i = 0; i < particleCount; i++) {
            const p = particles[i];
            
            
            p.y += Math.cos(p.d) + 1 + p.r / 2 * speed;
            p.x += Math.sin(0) * 2;
            
            
            if (p.x > width + 5 || p.x < -5 || p.y > height) {
                if (i % 3 > 0) { 
                    particles[i] = {
                        x: Math.random() * width,
                        y: -10,
                        r: p.r,
                        d: p.d,
                        a: p.a
                    };
                } else {
                    
                    if (Math.sin(0) > 0) {
                        particles[i] = {
                            x: -5,
                            y: Math.random() * height,
                            r: p.r,
                            d: p.d,
                            a: p.a
                        };
                    } else {
                        particles[i] = {
                            x: width + 5,
                            y: Math.random() * height,
                            r: p.r,
                            d: p.d,
                            a: p.a
                        };
                    }
                }
            }
        }
        requestAnimationFrame(draw);
    }
    
    
    window.addEventListener('resize', resize);
    
    
    resize();
    initParticles();
    draw();
});
</script>

<script>
    (function() {
        
        const textArray = [
            "写作，使我精确",
        ];
        
        
        const typeSpeed = 100;    
        const deleteSpeed = 50;   
        const waitTime = 2000;    

        
        const element = document.getElementById('typewriter');
        if (!element) return; 

        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentText = textArray[textIndex];
            
            if (isDeleting) {
                
                element.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                
                element.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }

            
            let delta = isDeleting ? deleteSpeed : typeSpeed;

            if (!isDeleting && charIndex === currentText.length) {
                
                delta = waitTime;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                
                isDeleting = false;
                textIndex = (textIndex + 1) % textArray.length; 
                delta = 500; 
            }

            setTimeout(type, delta);
        }

        
        document.addEventListener('DOMContentLoaded', type);
    })();
</script>
